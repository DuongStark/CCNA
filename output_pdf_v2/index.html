<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA Image Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; font-weight: 600; }
    .stats { margin-left: auto; display: flex; gap: 16px; font-size: 14px; }
    .stat { background: #2d3148; padding: 4px 12px; border-radius: 20px; }
    .stat.suspicious { background: #3d1f1f; color: #f87171; }
    .stat.ok { background: #1a3d2b; color: #4ade80; }

    .filters { padding: 12px 24px; background: #1a1d27; border-bottom: 1px solid #2d3148; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filters label { font-size: 13px; color: #94a3b8; }
    select, input { background: #2d3148; border: 1px solid #3d4468; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
    .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-export { background: #3b5bdb; color: white; }
    .btn-export:hover { background: #4c6ef5; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; padding: 20px 24px; }

    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
    .card.suspicious { border-color: #7f1d1d; }
    .card.ok { border-color: #14532d; }
    .card.flagged { border-color: #f59e0b; box-shadow: 0 0 0 2px #f59e0b40; }

    .card-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; background: #13151f; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge.suspicious { background: #7f1d1d; color: #fca5a5; }
    .badge.ok { background: #14532d; color: #86efac; }
    .topic-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #2d3148; color: #94a3b8; }
    .card-id { font-size: 12px; color: #64748b; margin-left: auto; }

    .card-img { width: 100%; max-height: 220px; object-fit: contain; background: #0d0f18; padding: 8px; cursor: pointer; }
    .card-img:hover { opacity: 0.9; }

    .card-body { padding: 12px 14px; }
    .question { font-size: 13px; color: #cbd5e1; line-height: 1.5; margin-bottom: 8px; max-height: 80px; overflow: hidden; position: relative; }
    .question::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 24px; background: linear-gradient(transparent, #1a1d27); }
    .reason { font-size: 12px; color: #64748b; font-style: italic; margin-bottom: 10px; }

    .card-actions { display: flex; gap: 8px; }
    .btn-ok { background: #14532d; color: #86efac; flex: 1; }
    .btn-ok:hover, .btn-ok.active { background: #166534; color: #4ade80; }
    .btn-sus { background: #7f1d1d; color: #fca5a5; flex: 1; }
    .btn-sus:hover, .btn-sus.active { background: #991b1b; color: #f87171; }
    .btn-flag { background: #78350f; color: #fcd34d; }
    .btn-flag:hover, .btn-flag.active { background: #92400e; }

    .empty { text-align: center; padding: 60px; color: #64748b; grid-column: 1/-1; }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: #000a; z-index: 100; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .modal-close { position: fixed; top: 20px; right: 20px; background: #fff2; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>🖼 CCNA Image Review</h1>
  <div class="stats">
    <span class="stat" id="stat-total">Total: 0</span>
    <span class="stat suspicious" id="stat-sus">⚠ Suspicious: 0</span>
    <span class="stat ok" id="stat-ok">✓ OK: 0</span>
    <span class="stat" id="stat-flagged">🚩 Flagged: 0</span>
  </div>
</header>

<div class="filters">
  <label>Filter:</label>
  <select id="filter-verdict">
    <option value="all">All</option>
    <option value="suspicious">Suspicious only</option>
    <option value="ok">OK only</option>
    <option value="flagged">Flagged only</option>
  </select>
  <select id="filter-topic">
    <option value="all">All topics</option>
  </select>
  <input type="text" id="search" placeholder="Search question..." style="width:220px">
  <button class="btn btn-export" onclick="exportFlagged()">Export Flagged JSON</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt="">
</div>

<script>
const IMG_BASE = '';
let data = [];
let overrides = JSON.parse(localStorage.getItem('ccna-overrides') || '{}');

async function loadData() {
  try {
    const resp = await fetch('scan_results2.json');
    data = await resp.json();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">Could not load scan_results2.json<br>Make sure the file server is running.</div>';
    return;
  }
  populateTopics();
  render();
}

function populateTopics() {
  const topics = [...new Set(data.map(d => d.topic))];
  const sel = document.getElementById('filter-topic');
  topics.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });
}

function getVerdict(item) {
  const key = `${item.topic}-${item.id}-${item.image}`;
  if (overrides[key]) return overrides[key];
  return item.verdict;
}

function render() {
  const verdict = document.getElementById('filter-verdict').value;
  const topic = document.getElementById('filter-topic').value;
  const search = document.getElementById('search').value.toLowerCase();

  let filtered = data.filter(item => {
    const v = getVerdict(item);
    const isFlagged = overrides[`${item.topic}-${item.id}-${item.image}`] === 'flagged';
    if (verdict === 'flagged' && !isFlagged) return false;
    if (verdict === 'suspicious' && v !== 'suspicious') return false;
    if (verdict === 'ok' && v !== 'ok') return false;
    if (topic !== 'all' && item.topic !== topic) return false;
    if (search && !item.question.toLowerCase().includes(search)) return false;
    return true;
  });

  // Stats
  const total = data.length;
  const sus = data.filter(d => getVerdict(d) === 'suspicious').length;
  const ok = data.filter(d => getVerdict(d) === 'ok').length;
  const flagged = Object.values(overrides).filter(v => v === 'flagged').length;
  document.getElementById('stat-total').textContent = `Total: ${total}`;
  document.getElementById('stat-sus').textContent = `⚠ Suspicious: ${sus}`;
  document.getElementById('stat-ok').textContent = `✓ OK: ${ok}`;
  document.getElementById('stat-flagged').textContent = `🚩 Flagged: ${flagged}`;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No items match the filter.</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const key = `${item.topic}-${item.id}-${item.image}`;
    const v = getVerdict(item);
    const isFlagged = overrides[key] === 'flagged';
    const imgSrc = `${IMG_BASE}/${item.topic}/images/${item.image}`;
    return `
    <div class="card ${isFlagged ? 'flagged' : v}" data-key="${key}">
      <div class="card-header">
        <span class="badge ${v}">${v === 'ok' ? '✓ OK' : '⚠ Suspicious'}</span>
        <span class="topic-badge">${item.topic}</span>
        ${isFlagged ? '<span class="badge" style="background:#78350f;color:#fcd34d">🚩 Flagged</span>' : ''}
        <span class="card-id">Q${item.id} · ${item.image}</span>
      </div>
      <img class="card-img" src="${imgSrc}" alt="${item.image}" onclick="openModal('${imgSrc}')" onerror="this.style.opacity=0.3;this.alt='Image not found'">
      <div class="card-body">
        <div class="question">${item.question}</div>
        <div class="reason">AI: ${item.reason || 'No reason provided'}</div>
        <div class="card-actions">
          <button class="btn btn-ok ${v==='ok'&&!isFlagged?'active':''}" onclick="setVerdict('${key}','ok')">✓ OK</button>
          <button class="btn btn-sus ${v==='suspicious'&&!isFlagged?'active':''}" onclick="setVerdict('${key}','suspicious')">⚠ Suspicious</button>
          <button class="btn btn-flag ${isFlagged?'active':''}" onclick="setVerdict('${key}','flagged')">🚩</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setVerdict(key, verdict) {
  if (overrides[key] === verdict) {
    delete overrides[key];
  } else {
    overrides[key] = verdict;
  }
  localStorage.setItem('ccna-overrides', JSON.stringify(overrides));
  render();
}

function openModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function exportFlagged() {
  const flagged = data.filter(d => overrides[`${d.topic}-${d.id}-${d.image}`] === 'flagged');
  const blob = new Blob([JSON.stringify(flagged, null, 2)], {type: 'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'flagged_images.json'; a.click();
}

document.getElementById('filter-verdict').addEventListener('change', render);
document.getElementById('filter-topic').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);

loadData();
</script>
</body>
</html>
