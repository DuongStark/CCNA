<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA ODT Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  
  .header { padding: 20px 24px; border-bottom: 1px solid #1e2433; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  .header span { font-size: 13px; color: #64748b; }

  .layout { display: flex; height: calc(100vh - 61px); }
  
  .sidebar { width: 220px; border-right: 1px solid #1e2433; overflow-y: auto; padding: 12px 0; flex-shrink: 0; }
  .sidebar-section { padding: 6px 16px; font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; }
  .topic-btn { display: block; width: 100%; text-align: left; padding: 8px 16px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .topic-btn:hover { background: #1e2433; color: #e2e8f0; }
  .topic-btn.active { background: #1e3a5f; color: #60a5fa; }
  .topic-btn .count { float: right; font-size: 11px; color: #475569; }

  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }
  
  .search-bar { margin-bottom: 16px; }
  .search-bar input { width: 100%; padding: 8px 12px; background: #1e2433; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; font-size: 13px; outline: none; }
  .search-bar input:focus { border-color: #3b82f6; }
  .search-bar input::placeholder { color: #475569; }

  .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #1e2433; border-radius: 8px; padding: 10px 16px; font-size: 13px; }
  .stat strong { color: #60a5fa; font-size: 18px; display: block; }
  .stat span { color: #64748b; }

  .question-card { background: #1a1f2e; border: 1px solid #1e2433; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .question-card:hover { border-color: #2d3748; }
  .q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .q-id { background: #1e3a5f; color: #60a5fa; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .q-type { background: #2d1f3a; color: #a78bfa; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .q-text { font-size: 13px; color: #cbd5e1; margin-bottom: 6px; line-height: 1.5; }
  .q-text-vi { font-size: 13px; color: #94a3b8; margin-bottom: 10px; line-height: 1.5; font-style: italic; }
  .options { margin-top: 8px; }
  .option { font-size: 12px; color: #64748b; padding: 3px 0; line-height: 1.5; }
  .option.correct { color: #4ade80; }
  .option-vi { font-size: 12px; color: #475569; padding: 2px 0; font-style: italic; }
  .option-vi.correct { color: #86efac; }
  .toggle-btn { background: none; border: 1px solid #2d3748; color: #64748b; font-size: 11px; padding: 3px 8px; border-radius: 4px; cursor: pointer; margin-top: 8px; }
  .toggle-btn:hover { border-color: #3b82f6; color: #60a5fa; }
  .code-block { background: #0d1117; border: 1px solid #2d3748; border-radius: 6px; padding: 10px 12px; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; color: #a3e635; overflow-x: auto; white-space: pre; margin-top: 8px; line-height: 1.6; }
  .divider { border-top: 1px solid #1e2433; margin: 8px 0; }

  .q-has-img { background: #1a3a2a; color: #4ade80; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .q-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .q-images img { max-width: 300px; max-height: 200px; border-radius: 6px; border: 1px solid #2d3748; cursor: pointer; object-fit: contain; background: #0f1117; }
  .img-label { font-size: 11px; color: #475569; margin-bottom: 4px; }
  .img-group { }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 20px; right: 24px; color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; }
  .empty { text-align: center; color: #475569; padding: 60px 0; font-size: 14px; }
  .loading { text-align: center; color: #475569; padding: 60px 0; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>📄 CCNA ODT Browser</h1>
  <span id="header-info">Loading...</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">Parts</div>
    <div id="topic-list"></div>
  </div>
  <div class="main">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search questions..." oninput="renderQuestions()">
    </div>
    <div class="stats" id="stats"></div>
    <div id="questions"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const PARTS = [
  { key: 'Part 11', file: 'Part 11.json' },
  { key: 'Part 12', file: 'Part 12.json' },
  { key: 'Part 13', file: 'Part 13.json' },
  { key: 'Part 14', file: 'part 14.json' },
  { key: 'Part 15', file: 'part 15.json' },
  { key: 'Part 16', file: 'Part 16.json' },
];
const BASE = '../output_odt';
let allData = {};
let currentTopic = null;

async function loadAll() {
  for (const part of PARTS) {
    try {
      const res = await fetch(`${BASE}/json/${encodeURIComponent(part.file)}`);
      const data = await res.json();
      allData[part.key] = data.questions || data;
    } catch(e) {
      allData[part.key] = [];
    }
  }
  renderSidebar();
  selectTopic(PARTS[0].key);
  const total = PARTS.reduce((s, p) => s + (allData[p.key]?.length || 0), 0);
  document.getElementById('header-info').textContent = `${PARTS.length} parts · ${total} questions`;
}

function renderSidebar() {
  const el = document.getElementById('topic-list');
  el.innerHTML = PARTS.map(p => {
    const qs = allData[p.key] || [];
    return `<button class="topic-btn" onclick="selectTopic('${p.key}')" id="btn-${p.key.replace(' ','-')}">
      ${p.key} <span class="count">${qs.length}q</span>
    </button>`;
  }).join('');
}

function selectTopic(topic) {
  currentTopic = topic;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  const id = 'btn-' + topic.replace(' ', '-');
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
  document.getElementById('search').value = '';
  renderQuestions();
}

function renderQuestions() {
  const qs = allData[currentTopic] || [];
  const search = document.getElementById('search').value.toLowerCase();

  const filtered = qs.filter(q => {
    if (!search) return true;
    return (q.question||'').toLowerCase().includes(search) ||
           (q.question_vi||'').toLowerCase().includes(search);
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${qs.length}</strong><span>Questions</span></div>
    <div class="stat"><strong>${filtered.length}</strong><span>Showing</span></div>
  `;

  if (!filtered.length) {
    document.getElementById('questions').innerHTML = '<div class="empty">No questions found</div>';
    return;
  }

  document.getElementById('questions').innerHTML = filtered.map(q => {
    const opts = q.options || {};
    const optsVi = q.options_vi || {};
    const hasImg = q.question_images?.length > 0;

    const imgs = (q.question_images || []).map(img =>
      `<div class="img-group">
        <div class="img-label">📷 ${img}</div>
        <img src="${BASE}/images/${currentTopic.replace(' ','_')}/${img}"
             onerror="this.style.opacity=0.3;this.title='Not found'"
             onclick="openLightbox(this.src)" alt="${img}">
      </div>`
    ).join('');

    const options = Object.entries(opts).map(([key, val]) => {
      const isCorrect = q.answer && q.answer.includes(key);
      const viVal = optsVi[key] || '';
      return `
        <div class="option ${isCorrect?'correct':''}">${key}. ${formatText(val)}</div>
        ${viVal ? `<div class="option-vi ${isCorrect?'correct':''}">&nbsp;&nbsp;&nbsp;↳ ${viVal}</div>` : ''}
      `;
    }).join('');

    return `<div class="question-card">
      <div class="q-header">
        <span class="q-id">#${q.id}</span>
        ${q.type === 'multiple' ? '<span class="q-type">multi</span>' : ''}
        ${hasImg ? '<span class="q-has-img">🖼 has image</span>' : ''}
      </div>
      <div class="q-text">${formatText(q.question)}</div>
      ${q.question_vi ? `<div class="q-text-vi">${q.question_vi}</div>` : ''}
      ${imgs ? `<div class="q-images">${imgs}</div>` : ''}
      <button class="toggle-btn" onclick="toggleOptions(this)">Show options</button>
      <div class="options" style="display:none">
        ${options}
      </div>
    </div>`;
  }).join('');
}

function formatText(text) {
  if (!text) return '';
  const lines = text.split('\n');
  const codePatterns = /^(\s{2,}|[A-Za-z0-9_\-]+[#>$]\s|interface |router |ip |show |Building config|!$|\*|Codes:|Gateway of|[A-Z]\s+\d+\.\d+)/;
  const result = [];
  let codeBuffer = [];
  let textBuffer = [];

  const flushText = () => {
    if (textBuffer.length) {
      result.push(`<span>${textBuffer.join('<br>').trim()}</span>`);
      textBuffer = [];
    }
  };
  const flushCode = () => {
    if (codeBuffer.length) {
      // trim trailing empty lines
      while (codeBuffer.length && codeBuffer[codeBuffer.length-1].trim() === '') codeBuffer.pop();
      result.push(`<pre class="code-block">${codeBuffer.join('\n')}</pre>`);
      codeBuffer = [];
    }
  };

  for (const line of lines) {
    if (codePatterns.test(line) || line.trim() === '!') {
      flushText();
      codeBuffer.push(line);
    } else if (line.trim() === '') {
      if (codeBuffer.length) codeBuffer.push(line);
      // skip blank lines in text mode
    } else {
      flushCode();
      textBuffer.push(line);
    }
  }
  flushText();
  flushCode();
  return result.join('');
}

function toggleOptions(btn) {
  const opts = btn.nextElementSibling;
  const show = opts.style.display === 'none';
  opts.style.display = show ? 'block' : 'none';
  btn.textContent = show ? 'Hide options' : 'Show options';
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

loadAll();
</script>
</body>
</html>
