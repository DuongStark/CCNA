<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF CLI Debug — CCNA Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAF9F5; font-family: Inter, system-ui, sans-serif; font-size: 15px; color: #1a1a1a; padding: 24px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .badge { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
  .badge-pos { background: #f0f0f0; color: #555; }
  .badge-id { background: #D97757; color: #fff; }
  .badge-topic { background: #f3f4f6; color: #374151; }
  .question { line-height: 1.6; margin-bottom: 12px; }
  pre.cli { background: #1e1e2e; color: #cdd6f4; font-family: 'IBM Plex Mono', Consolas, monospace; font-size: 12px; padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 6px 0; white-space: pre; }
  .prose { margin: 4px 0; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-bar input { padding: 6px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 220px; }
  .count { color: #888; font-size: 13px; }
  .hidden { display: none; }
  .topic-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .topic-btn { padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; cursor: pointer; background: #fff; }
  .topic-btn.active { background: #D97757; color: #fff; border-color: #D97757; }
</style>
</head>
<body>
<h1>PDF CLI Debug Page</h1>
<p class="meta">91 câu có CLI trong PDF — kiểm tra render đúng/sai</p>

<div class="filter-bar">
  <input type="text" id="search" placeholder="Tìm theo ID hoặc text..." oninput="render()">
  <span class="count" id="count"></span>
</div>
<div class="topic-filter" id="topicFilter"></div>

<div id="cards"></div>

<script>
let questions = [];
let currentTopic = 'all';

const CLI_PROMPT_RE = /^(?:[\w.-]+(?:\([\w-]*\))?[>#]\s*|Router[>(#]|Switch[>(#]|R\d+[\w(>#]|SW\d+[\w(>#])/;
const CLI_KEYWORD_RE = /^(?:interface\s|ip\s|no\s|router\s(?:ospf|bgp|eigrp|rip|isis|static)\s|switch\s(?:virtual|mode|trunk|access)\s|enable\b|configure\s|line\s|access-list\s|vlan\s|hostname\s|description\s|switchport\s|spanning-tree\s|encapsulation\s|show\s|ping\s|traceroute\s|debug\s|copy\s|write\s|crypto\s|username\s|password\s|service\s|logging\s|snmp\s|ntp\s|banner\s|aaa\s|nat\s|permit\s|deny\s|duplex\s|speed\s|negotiation\s|lldp\s|cdp\s|channel-group\s|port-channel\s|lacp\s|shutdown\b|exit\b|end\b|Building\s|Current\s|Gateway\s|Codes:|Legend:|--|FastEthernet|GigabitEthernet|TenGigabit|Serial\d|Ethernet\d|\d+\.\d+\.\d+\.\d+\/\d+\s+is\s|[A-Z]\s+\d+\.\d+\.\d+\.\d+)/i;

function looksLikeCli(line) {
  const t = line.trim();
  if (!t) return false;
  return CLI_PROMPT_RE.test(t) || CLI_KEYWORD_RE.test(t);
}

function splitIntoSegments(text) {
  if (!text) return [];
  const PROSE_RE = /^(?:which|what|how|why|where|when|who|select|choose|an |a |the |this |that |these |if |given |based |refer |drag |place |match |\w.*\?$)/i;
  const lines = text.split('\n');
  const segments = [];
  let buffer = [], bufferKind = null, inCliBlock = false;
  const flush = () => {
    if (!buffer.length) return;
    segments.push({ kind: bufferKind, text: buffer.join('\n') });
    buffer = [];
  };
  for (const line of lines) {
    const trimmed = line.trim();
    if (inCliBlock) {
      const isClearProse = PROSE_RE.test(trimmed) && !CLI_PROMPT_RE.test(trimmed) && trimmed.length > 20;
      if (isClearProse) { inCliBlock = false; flush(); bufferKind = 'prose'; buffer.push(line); }
      else buffer.push(line);
      continue;
    }
    if (CLI_PROMPT_RE.test(trimmed)) { inCliBlock = true; flush(); bufferKind = 'cli'; buffer.push(line); continue; }
    const kind = looksLikeCli(line) ? 'cli' : 'prose';
    if (kind !== bufferKind) { flush(); bufferKind = kind; }
    if (kind === 'cli') inCliBlock = true;
    buffer.push(line);
  }
  flush();
  return segments.length ? segments : [{ kind: 'prose', text }];
}

function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderQuestion(text) {
  return splitIntoSegments(text).map(s =>
    s.kind === 'cli'
      ? `<pre class="cli">${esc(s.text)}</pre>`
      : `<p class="prose">${esc(s.text)}</p>`
  ).join('');
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('cards');
  let visible = 0;
  container.innerHTML = questions.map(q => {
    const matchTopic = currentTopic === 'all' || q.topic === currentTopic;
    const matchSearch = !search || String(q.id).includes(search) || q.question.toLowerCase().includes(search);
    if (!matchTopic || !matchSearch) return `<div class="hidden"></div>`;
    visible++;
    return `<div class="card">
      <div class="card-header">
        <span class="badge badge-pos">Câu ${q.pos}/${q.total}</span>
        <span class="badge badge-id">#${q.id}</span>
        <span class="badge badge-topic">${q.topic}</span>
      </div>
      <div class="question">${renderQuestion(q.question)}</div>
    </div>`;
  }).join('');
  document.getElementById('count').textContent = `${visible} câu`;
}

function buildTopicFilter(topics) {
  const bar = document.getElementById('topicFilter');
  const all = document.createElement('button');
  all.className = 'topic-btn active'; all.textContent = 'Tất cả';
  all.onclick = () => { currentTopic = 'all'; bar.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active')); all.classList.add('active'); render(); };
  bar.appendChild(all);
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn'; btn.textContent = t;
    btn.onclick = () => { currentTopic = t; bar.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    bar.appendChild(btn);
  });
}

fetch('pdf_debug.json').then(r => r.json()).then(data => {
  questions = data;
  const topics = [...new Set(data.map(q => q.topic))];
  buildTopicFilter(topics);
  render();
});
</script>
</body>
</html>
